services:
  - type: web
    name: ticketflow1-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /swagger-ui.html
    envVars:
      - key: SERVER_PORT
        value: 10000
      - key: SPRING_PROFILES_ACTIVE
        value: demo
      - key: COOKIE_SECURE
        value: true
      - key: APP_CORS_ALLOWED_ORIGINS
        value: https://ticketflow1-web.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: POSTGRES_HOST
        fromDatabase:
          name: ticketflow1-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: ticketflow1-db
          property: port
      - key: POSTGRES_DB
        fromDatabase:
          name: ticketflow1-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: ticketflow1-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: ticketflow1-db
          property: password

  - type: web
    name: ticketflow1-web
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NEXT_PUBLIC_API_BASE_URL
        value: /api
      - key: BACKEND_HOST
        value: ticketflow1-api.onrender.com

databases:
  - name: ticketflow1-db
    plan: free
    databaseName: ticketflow1
    user: ticketflow1

services:
  postgres:
    image: postgres:16
    container_name: ticketflow1-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ticketflow1_ticketing}
      POSTGRES_USER: ${POSTGRES_USER:-ticketflow1}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ticketflow1}
    # Host port 5433 (not 5432) to avoid clashing with a locally-installed
    # Postgres already bound to 5432. Container-internal port stays 5432.
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - ticketflow1_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ticketflow1} -d ${POSTGRES_DB:-ticketflow1_ticketing}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: ticketflow1-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ticketflow1_ticketing}
      POSTGRES_USER: ${POSTGRES_USER:-ticketflow1}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ticketflow1}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ticketflow1_ticketing}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "${SERVER_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8081/swagger-ui.html || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  ticketflow1_pgdata:

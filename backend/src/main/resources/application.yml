server:
  # 8081, not the conventional 8080, to avoid clashing with another local
  # service already bound to 8080. Override with SERVER_PORT if needed.
  port: ${SERVER_PORT:${PORT:8081}}

spring:
  application:
    name: ticketing

  # Defaults match docker-compose.yml, so `./mvnw spring-boot:run` works with no
  # .env exported. Override via env vars (POSTGRES_*, JWT_SECRET) in real setups.
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${POSTGRES_DB:ticketflow1_ticketing}
    username: ${POSTGRES_USER:ticketflow1}
    password: ${POSTGRES_PASSWORD:ticketflow1}

  jpa:
    # Schema truth lives in Flyway. Hibernate only validates that entities match
    # the migrated schema at startup — it never creates or alters tables.
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

# App-specific config (bound in Phase 1 Step 4 by JwtService)
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-hours: 8
  attachments:
    max-size-bytes: ${ATTACHMENT_MAX_SIZE_BYTES:104857600}
    storage-directory: ${ATTACHMENT_STORAGE_DIRECTORY:./data/attachments}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  security:
    # HTTPS deployments keep this enabled. Plain-HTTP local development opts out.
    secure-cookies: ${COOKIE_SECURE:false}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
